<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geology Empire — Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   GEOLOGY EMPIRE COMMAND CENTER v4.0
   Crystal Cave Aesthetic — Pure HTML/CSS/JS
   ══════════════════════════════════════════ */

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #080810;
  --surface: #0c0c1a;
  --surface2: #111122;
  --surface3: #181830;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --text: #d8d8ee;
  --text-dim: #6a6a8a;
  --azurite: #2980b9;
  --azurite-deep: #1a5276;
  --rhodochrosite: #e74c8c;
  --mineral-green: #27ae60;
  --gold: #f39c12;
  --crystal-blue: #3498db;
  --amethyst: #9b59b6;
  --ruby: #e74c3c;
  --radius: 14px;
  --radius-sm: 10px;
  --glass-bg: rgba(12, 12, 28, 0.65);
  --glass-border: rgba(255,255,255,0.08);
}

html {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

body {
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  background:
    radial-gradient(ellipse 600px 400px at 15% 20%, rgba(26,82,118,0.15) 0%, transparent 70%),
    radial-gradient(ellipse 500px 350px at 80% 70%, rgba(231,76,140,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 400px 300px at 50% 50%, rgba(39,174,96,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 300px 300px at 90% 15%, rgba(243,156,18,0.05) 0%, transparent 70%),
    var(--bg);
}

/* ═══ FLOATING MINERAL PARTICLES ═══ */
.particle-field {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.particle {
  position: absolute;
  border-radius: 50%;
  opacity: 0;
  animation: particleDrift linear infinite;
}

@keyframes particleDrift {
  0% {
    opacity: 0;
    transform: translateY(100vh) translateX(0) scale(0.5);
  }
  10% { opacity: 0.6; }
  90% { opacity: 0.4; }
  100% {
    opacity: 0;
    transform: translateY(-10vh) translateX(40px) scale(1.2);
  }
}

/* ═══ LAYOUT ═══ */
.app {
  display: flex;
  min-height: 100vh;
  position: relative;
  z-index: 1;
}

/* ═══ SIDEBAR ═══ */
.sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0;
  bottom: 0;
  left: 0;
  z-index: 50;
  backdrop-filter: blur(20px);
  transition: transform 0.3s ease;
}

.sidebar-header {
  padding: 20px 16px 14px;
  border-bottom: 1px solid var(--border);
}

.logo-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
}

.logo-icon {
  font-size: 22px;
  animation: crystalPulse 4s ease-in-out infinite;
}

@keyframes crystalPulse {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(1.4) drop-shadow(0 0 6px rgba(41,128,185,0.6)); }
}

.logo-text {
  font-size: 15px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
  font-family: 'Fira Code', monospace;
}

.sidebar-section {
  padding: 14px 16px 4px;
  font-size: 9px;
  font-weight: 700;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  border-radius: 8px;
  margin: 2px 8px;
  color: var(--text-dim);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;
}

.nav-item:hover {
  background: rgba(41,128,185,0.1);
  color: var(--text);
}

.nav-item.active {
  background: rgba(41,128,185,0.15);
  color: var(--azurite);
  font-weight: 600;
}

.nav-item.active::before {
  content: '';
  position: absolute;
  left: -8px;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 60%;
  background: var(--azurite);
  border-radius: 0 3px 3px 0;
}

.nav-icon {
  font-size: 15px;
  width: 20px;
  text-align: center;
}

.sidebar-footer {
  margin-top: auto;
  padding: 12px;
  border-top: 1px solid var(--border);
}

.team-pills {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.team-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  background: var(--surface2);
  border-radius: 8px;
  font-size: 11px;
}

.team-pill-name {
  color: var(--text);
  font-weight: 600;
  flex: 1;
}

.team-pill-role {
  color: var(--text-dim);
  font-size: 9px;
}

/* ═══ HAMBURGER MENU (MOBILE) ═══ */
.hamburger {
  display: none;
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 100;
  width: 40px;
  height: 40px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: var(--text);
}

.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 45;
}

/* ═══ MAIN CONTENT ═══ */
.main {
  margin-left: 220px;
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.topbar {
  background: rgba(12,12,26,0.8);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 40;
}

.topbar-title {
  font-size: 17px;
  font-weight: 700;
  color: #fff;
}

.topbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 14px;
}

.live-clock {
  font-family: 'Fira Code', monospace;
  font-size: 12px;
  color: var(--azurite);
  font-weight: 500;
  letter-spacing: 0.5px;
}

.last-update {
  font-size: 10px;
  color: var(--text-dim);
  font-family: 'Fira Code', monospace;
}

.content {
  padding: 24px;
  flex: 1;
}

/* ═══ PANEL TRANSITIONS ═══ */
.panel {
  display: none;
}

.panel.active {
  display: block;
  animation: panelIn 0.4s ease forwards;
}

@keyframes panelIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ═══ GLASSMORPHISM CARDS ═══ */
.glass-card {
  background: var(--glass-bg);
  backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.glass-card::before {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: var(--radius);
  padding: 1px;
  background: linear-gradient(135deg, rgba(41,128,185,0.2), transparent 50%, rgba(231,76,140,0.1));
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask-composite: exclude;
  -webkit-mask-composite: xor;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.glass-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 0 1px rgba(41,128,185,0.15);
}

.glass-card:hover::before {
  opacity: 1;
}

/* ═══ STATUS DOTS WITH PULSE ═══ */
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  position: relative;
}

.status-dot.green {
  background: var(--mineral-green);
  box-shadow: 0 0 8px var(--mineral-green);
}

.status-dot.yellow {
  background: var(--gold);
  box-shadow: 0 0 8px var(--gold);
}

.status-dot.red {
  background: var(--ruby);
  box-shadow: 0 0 8px var(--ruby);
}

.status-dot::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  border: 2px solid currentColor;
  opacity: 0;
  animation: statusPulse 2s ease-out infinite;
}

.status-dot.green::after { border-color: var(--mineral-green); }
.status-dot.yellow::after { border-color: var(--gold); }
.status-dot.red::after { border-color: var(--ruby); }

@keyframes statusPulse {
  0% { transform: scale(1); opacity: 0.8; }
  100% { transform: scale(2.5); opacity: 0; }
}

/* ═══ CRYSTAL SHIMMER ANIMATION ═══ */
@keyframes crystalShimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}

.shimmer-border {
  position: relative;
}

.shimmer-border::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  border: 1px solid transparent;
  background: linear-gradient(90deg, transparent, rgba(41,128,185,0.3), transparent) border-box;
  background-size: 200% 100%;
  mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  mask-composite: exclude;
  -webkit-mask-composite: xor;
  animation: crystalShimmer 6s linear infinite;
  pointer-events: none;
}

/* ═══ TOAST NOTIFICATION ═══ */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--mineral-green);
  color: #fff;
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  z-index: 9999;
  transform: translateY(80px);
  opacity: 0;
  transition: all 0.3s ease;
  box-shadow: 0 8px 24px rgba(39,174,96,0.3);
}

.toast.show {
  transform: translateY(0);
  opacity: 1;
}

/* ═══════════════════════════════════════
   TAB 1: OFFICE SCENE
   ═══════════════════════════════════════ */
.office-scene {
  position: relative;
}

.office-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  grid-template-rows: auto auto;
  gap: 20px;
}

.office-grid .desk-card:nth-child(5) {
  grid-column: 2;
}

.desk-card {
  background: var(--glass-bg);
  backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 0;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
}

.desk-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 20px rgba(41,128,185,0.1);
  border-color: rgba(41,128,185,0.3);
}

.desk-card.ceo-desk {
  border-color: rgba(243,156,18,0.2);
}

.desk-card.ceo-desk:hover {
  border-color: rgba(243,156,18,0.4);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 20px rgba(243,156,18,0.15);
}

.desk-card.director-desk {
  border-color: rgba(41,128,185,0.2);
}

.desk-card.director-desk:hover {
  border-color: rgba(41,128,185,0.4);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 20px rgba(41,128,185,0.15);
}

.desk-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
}

.desk-avatar {
  font-size: 28px;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface2);
  border-radius: 10px;
}

.desk-info {
  flex: 1;
}

.desk-name {
  font-size: 14px;
  font-weight: 700;
  color: #fff;
}

.desk-role {
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 600;
}

/* Desk monitor screen */
.desk-monitor {
  margin: 12px;
  background: #05050f;
  border: 1px solid rgba(41,128,185,0.15);
  border-radius: 8px;
  padding: 12px;
  position: relative;
  min-height: 100px;
  font-family: 'Fira Code', monospace;
  font-size: 10px;
  color: var(--azurite);
  line-height: 1.6;
  overflow: hidden;
}

.desk-monitor::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--azurite), transparent);
  opacity: 0.3;
}

.desk-monitor .monitor-label {
  font-size: 8px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}

.desk-monitor .monitor-content {
  color: #8ab4d8;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 80px;
  overflow: hidden;
}

.desk-footer {
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 10px;
  color: var(--text-dim);
}

.desk-task {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.desk-time {
  font-family: 'Fira Code', monospace;
  font-size: 9px;
  flex-shrink: 0;
  margin-left: 8px;
}

/* Detail panel (expanded character) */
.detail-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 200;
  align-items: center;
  justify-content: center;
}

.detail-overlay.active {
  display: flex;
}

.detail-panel {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  max-width: 560px;
  width: 92%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 28px;
  position: relative;
  box-shadow: 0 24px 80px rgba(0,0,0,0.6);
}

.detail-close {
  position: absolute;
  top: 16px;
  right: 16px;
  font-size: 22px;
  cursor: pointer;
  color: var(--text-dim);
  transition: color 0.2s;
  background: none;
  border: none;
  font-family: inherit;
}

.detail-close:hover { color: #fff; }

.detail-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}

.detail-avatar {
  font-size: 42px;
  width: 60px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface2);
  border-radius: 14px;
}

.detail-name {
  font-size: 22px;
  font-weight: 800;
  color: #fff;
}

.detail-role-text {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 2px;
}

.detail-section {
  margin-top: 18px;
}

.detail-section-title {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.detail-monitor-large {
  background: #05050f;
  border: 1px solid rgba(41,128,185,0.15);
  border-radius: 10px;
  padding: 16px;
  font-family: 'Fira Code', monospace;
  font-size: 11px;
  color: var(--azurite);
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 200px;
  overflow-y: auto;
}

/* ═══════════════════════════════════════
   TAB 2: DASHBOARD
   ═══════════════════════════════════════ */

.dash-stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--glass-bg);
  backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  padding: 16px;
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
}

.stat-card:hover {
  border-color: rgba(41,128,185,0.3);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  border-radius: 10px 10px 0 0;
}

.stat-card.blue::before { background: linear-gradient(90deg, var(--azurite), var(--crystal-blue)); }
.stat-card.green::before { background: linear-gradient(90deg, var(--mineral-green), #2ecc71); }
.stat-card.pink::before { background: linear-gradient(90deg, var(--rhodochrosite), #ff6b9d); }
.stat-card.gold::before { background: linear-gradient(90deg, var(--gold), #f1c40f); }
.stat-card.purple::before { background: linear-gradient(90deg, var(--amethyst), #bb86fc); }
.stat-card.red::before { background: linear-gradient(90deg, var(--ruby), #ff6b6b); }

.stat-icon { font-size: 18px; margin-bottom: 8px; }
.stat-value {
  font-size: 26px;
  font-weight: 800;
  color: #fff;
  line-height: 1;
  margin-bottom: 4px;
  font-family: 'Fira Code', monospace;
}
.stat-label {
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 600;
}
.stat-sub {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 6px;
}
.stat-sub.ok { color: var(--mineral-green); }
.stat-sub.warn { color: var(--gold); }
.stat-sub.bad { color: var(--ruby); }

/* Mini sparkline bars */
.mini-bars {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 24px;
  margin-top: 8px;
}

.mini-bar {
  flex: 1;
  min-width: 4px;
  background: var(--azurite);
  border-radius: 2px 2px 0 0;
  opacity: 0.6;
  transition: height 0.3s ease;
}

/* Featured post card */
.featured-post {
  background: var(--glass-bg);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(243,156,18,0.15);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}

.featured-post::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--gold), var(--rhodochrosite));
}

.featured-label {
  font-size: 9px;
  font-weight: 700;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.featured-text {
  font-size: 15px;
  color: #fff;
  line-height: 1.5;
  margin-bottom: 12px;
  font-style: italic;
}

.featured-meta {
  display: flex;
  gap: 16px;
  font-size: 11px;
  color: var(--text-dim);
  flex-wrap: wrap;
}

.featured-meta span {
  display: flex;
  align-items: center;
  gap: 4px;
}

/* DB Stats bar */
.db-stats-bar {
  background: var(--glass-bg);
  backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  margin-bottom: 24px;
  font-family: 'Fira Code', monospace;
  font-size: 13px;
}

.db-stat {
  color: var(--mineral-green);
  font-weight: 600;
}

.db-stat-sep {
  color: var(--text-dim);
  font-size: 18px;
}

/* Cost fuel gauge */
.fuel-gauge-container {
  background: var(--glass-bg);
  backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  padding: 16px 20px;
  margin-bottom: 24px;
}

.fuel-gauge-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-size: 12px;
  font-weight: 600;
}

.fuel-gauge-title {
  color: var(--text);
}

.fuel-gauge-value {
  color: var(--mineral-green);
  font-family: 'Fira Code', monospace;
}

.fuel-gauge-track {
  height: 10px;
  background: var(--surface2);
  border-radius: 5px;
  overflow: hidden;
  position: relative;
}

.fuel-gauge-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 1s ease, background 0.5s ease;
  position: relative;
}

.fuel-gauge-fill::after {

// ─── PARTICLES ───
function createParticles() {
  const field = document.getElementById('particleField');
  const colors = ['#2980b9', '#e74c8c', '#27ae60', '#f39c12', '#9b59b6', '#3498db'];
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 2 + Math.random() * 4;
    const color = colors[Math.floor(Math.random() * colors.length)];
    p.style.cssText =
      'width:' + size + 'px;height:' + size + 'px;' +
      'left:' + (Math.random()*100) + '%;' +
      'background:' + color + ';' +
      'box-shadow:0 0 ' + (size*2) + 'px ' + color + ';' +
      'animation-duration:' + (15+Math.random()*25) + 's;' +
      'animation-delay:' + (-Math.random()*30) + 's;';
    field.appendChild(p);
  }
}

// ─── CLOCK ───
function startClock() {
  function tick() {
    const now = new Date();
    document.getElementById('liveClock').textContent = now.toLocaleTimeString('en-US', { hour12: true });
  }
  tick();
  setInterval(tick, 1000);
}

// ─── FETCH DATA ───
async function fetchData() {
  try {
    const r = await fetch('data.json?t=' + Date.now());
    liveData = await r.json();
    document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date(liveData.updated_at).toLocaleString();
  } catch(e) {
    console.warn('data.json fetch failed, using placeholders');
    liveData = getPlaceholderData();
    document.getElementById('lastUpdate').textContent = 'Offline mode';
  }
  renderCurrentTab();
}

// ─── TAB SWITCHING ───
let currentTab = 'office';

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
  document.getElementById('panel-' + tab).classList.add('active');
  if (el) el.classList.add('active');
  document.getElementById('topbarTitle').textContent = TAB_TITLES[tab] || tab;
  renderCurrentTab();
  // Close sidebar on mobile
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('active');
  }
}

function renderCurrentTab() {
  if (!liveData) return;
  switch(currentTab) {
    case 'office': renderOffice(); break;
    case 'dashboard': renderDashboard(); break;
    case 'tasks': renderKanban(); break;
    case 'posts': renderPosts(); break;
    case 'budget': renderBudget(); break;
  }
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('active');
}

function renderOffice() {
  var grid = document.getElementById('officeGrid');
  grid.innerHTML = '';

  CHARACTERS.forEach(function(char) {
    var agent = char.dataKey ? liveData.agents[char.dataKey] : null;
    var status = agent ? agent.status : (char.id === 'andres' ? 'active' : 'idle');
    var statusClass = (status === 'running' || status === 'active') ? 'green' : (status === 'idle' ? 'yellow' : 'red');
    var lastActivity = agent ? agent.last_activity : getAndresMonitor();

    // Determine monitor content
    var monitorText = lastActivity || 'Awaiting data...';
    if (char.id === 'andres') {
      monitorText = getAndresMonitor();
    }

    // Find current task for this character
    var charTask = tasks.find(function(t) {
      return t.assign === char.id && (t.status === 'progress' || t.status === 'todo');
    });
    var taskText = charTask ? charTask.title : 'No active task';

    // Last action time
    var timeMatch = monitorText.match(/\[(\d{4}-\d{2}-\d{2}\s\d{2}:\d{2}:\d{2})\]/);
    var timeStr = timeMatch ? timeMatch[1].split(' ')[1] : 'now';

    var card = document.createElement('div');
    card.className = 'desk-card ' + char.deskClass;
    card.innerHTML =
      '<div class="desk-header">' +
        '<div class="desk-avatar">' + char.emoji + '</div>' +
        '<div class="desk-info">' +
          '<div class="desk-name">' + char.name + '</div>' +
          '<div class="desk-role">' + char.role + '</div>' +
        '</div>' +
        '<div class="status-dot ' + statusClass + '"></div>' +
      '</div>' +
      '<div class="desk-monitor shimmer-border">' +
        '<div class="monitor-label">' + char.monitorLabel + '</div>' +
        '<div class="monitor-content">' + escHtml(monitorText.substring(0, 200)) + '</div>' +
      '</div>' +
      '<div class="desk-footer">' +
        '<div class="desk-task">' + escHtml(taskText) + '</div>' +
        '<div class="desk-time">' + timeStr + '</div>' +
      '</div>';

    (function(c) {
      card.addEventListener('click', function() { openDetail(c); });
    })(char);

    grid.appendChild(card);
  });
}

function getAndresMonitor() {
  if (!liveData) return 'Loading...';
  var f = liveData.followers;
  var lines = 'FOLLOWER COUNTS\n';
  for (var handle in f) {
    if (f.hasOwnProperty(handle)) {
      lines += '@' + handle + ': ' + f[handle].count.toLocaleString() + ' (' + f[handle].platform + ')\n';
    }
  }
  lines += '\nBudget: $' + liveData.budget.spent.toFixed(2) + ' / $' + liveData.budget.limit.toFixed(2);
  return lines;
}

// ─── CHARACTER DETAIL ───
function openDetail(char) {
  var panel = document.getElementById('detailPanel');
  var agent = char.dataKey ? liveData.agents[char.dataKey] : null;
  var status = agent ? agent.status : 'active';
  var statusClass = (status === 'running' || status === 'active') ? 'green' : (status === 'idle' ? 'yellow' : 'red');
  var statusText = (status === 'running' || status === 'active') ? 'Active' : status.charAt(0).toUpperCase() + status.slice(1);
  var lastActivity = agent ? agent.last_activity : getAndresMonitor();

  // Find related log entries
  var relatedLogs = [];
  if (char.dataKey && liveData.activity_log) {
    relatedLogs = liveData.activity_log.filter(function(e) {
      return e.indexOf('[' + char.dataKey + ']') !== -1;
    }).slice(-8);
  }

  // Find tasks
  var charTasks = tasks.filter(function(t) { return t.assign === char.id; });

  var tasksHtml = '';
  if (charTasks.length === 0) {
    tasksHtml = '<div style="font-size:12px;color:var(--text-dim)">No tasks assigned</div>';
  } else {
    charTasks.forEach(function(t) {
      tasksHtml +=
        '<div style="padding:8px 10px;background:var(--surface2);border-radius:8px;margin-bottom:6px;font-size:12px;">' +
          '<div style="font-weight:600;color:#fff;">' + escHtml(t.title) + '</div>' +
          '<div style="color:var(--text-dim);font-size:10px;margin-top:2px;">' + escHtml(t.note || '') + '</div>' +
          '<div style="display:flex;gap:8px;margin-top:4px;">' +
            '<span class="priority-tag ' + t.priority + '">' + t.priority + '</span>' +
            '<span style="font-size:9px;color:var(--text-dim);text-transform:uppercase">' + t.status + '</span>' +
          '</div>' +
        '</div>';
    });
  }

  var logsHtml = '';
  if (relatedLogs.length > 0) {
    logsHtml =
      '<div class="detail-section">' +
        '<div class="detail-section-title">Recent Activity</div>' +
        '<div class="detail-monitor-large">' + relatedLogs.map(escHtml).join('\n') + '</div>' +
      '</div>';
  }

  panel.innerHTML =
    '<button class="detail-close" onclick="closeDetail()">&times;</button>' +
    '<div class="detail-header">' +
      '<div class="detail-avatar">' + char.emoji + '</div>' +
      '<div>' +
        '<div class="detail-name">' + char.name + '</div>' +
        '<div class="detail-role-text">' + char.role + '</div>' +
        '<div style="display:flex;align-items:center;gap:6px;margin-top:6px;">' +
          '<span class="status-dot ' + statusClass + '"></span>' +
          '<span style="font-size:11px;color:var(--text-dim)">' + statusText + '</span>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="detail-section">' +
      '<div class="detail-section-title">Monitor Output</div>' +
      '<div class="detail-monitor-large">' + escHtml(lastActivity) + '</div>' +
    '</div>' +
    logsHtml +
    '<div class="detail-section">' +
      '<div class="detail-section-title">Assigned Tasks (' + charTasks.length + ')</div>' +
      tasksHtml +
    '</div>';

  document.getElementById('detailOverlay').classList.add('active');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('active');
}

  var b = liveData.budget;

  else if (pct < 70) color = 'var(--gold)';
  else color = 'var(--ruby)';

  document.getElementById('fuelGauge').innerHTML =
    '<div class="fuel-gauge-label">' +
      '<span class="fuel-gauge-title">\u{1F6E2}\uFE0F Cost Fuel Gauge</span>' +
      '<span class="fuel-gauge-value" style="color:' + color + '">$' + b.spent.toFixed(3) + ' / $' + b.limit.toFixed(2) + '</span>' +
    '</div>' +
    '<div class="fuel-gauge-track">' +
      '<div class="fuel-gauge-fill" style="width:' + Math.max(pct, 1) + '%;background:linear-gradient(90deg,' + color + ',' + color + ')"></div>' +

    '<div class="form-group">' +
      '<label class="form-label">Status</label>' +
      '<select class="form-control" id="mt-status">' +
        '<option value="todo"' + (t.status==='todo'?' selected':'') + '>To Do</option>' +
        '<option value="progress"' + (t.status==='progress'?' selected':'') + '>In Progress</option>' +
        '<option value="blocked"' + (t.status==='blocked'?' selected':'') + '>Blocked</option>' +
        '<option value="done"' + (t.status==='done'?' selected':'') + '>Done</option>' +
      '</select>' +
    '</div>' +
    '<div class="form-group">' +
      '<label class="form-label">Assign To</label>' +
      '<select class="form-control" id="mt-assign">' +
        '<option value="maya"' + (t.assign==='maya'?' selected':'') + '>Maya Cole</option>' +
        '<option value="andres"' + (t.assign==='andres'?' selected':'') + '>Andres Carrillo</option>' +
        '<option value="goku"' + (t.assign==='goku'?' selected':'') + '>Goku</option>' +
        '<option value="mary"' + (t.assign==='mary'?' selected':'') + '>Mary Goodman</option>' +
        '<option value="pikachu"' + (t.assign==='pikachu'?' selected':'') + '>Pikachu</option>' +
      '</select>' +
    '</div>' +
    '<div class="form-group">' +
      '<label class="form-label">Priority</label>' +
      '<select class="form-control" id="mt-priority">' +
        '<option value="high"' + (t.priority==='high'?' selected':'') + '>High</option>' +
        '<option value="med"' + (t.priority==='med'?' selected':'') + '>Medium</option>' +
        '<option value="low"' + (t.priority==='low'?' selected':'') + '>Low</option>' +
      '</select>' +
    '</div>' +
    '<div class="modal-actions">' +
      '<button class="modal-btn primary" onclick="saveTask(\'' + t.id + '\')">Save Changes</button>' +
      '<button class="modal-btn danger" onclick="deleteTask(\'' + t.id + '\')">Delete</button>' +
      '<button class="modal-btn secondary" onclick="closeModal()">Cancel</button>' +
    '</div>';
  document.getElementById('modalOverlay').classList.add('active');
}

function saveTask(taskId) {
  var t = tasks.find(function(x) { return x.id === taskId; });
  if (!t) return;
  t.title = document.getElementById('mt-title').value.trim();
  t.note = document.getElementById('mt-note').value.trim();
  t.status = document.getElementById('mt-status').value;
  t.assign = document.getElementById('mt-assign').value;
  t.priority = document.getElementById('mt-priority').value;
  saveTasks();
  closeModal();
  renderKanban();
  showToast('Task updated');
}

function deleteTask(taskId) {
  tasks = tasks.filter(function(x) { return x.id !== taskId; });
  saveTasks();
  closeModal();
  renderKanban();
  showToast('Task deleted');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

// ═══════════════════════════════════════
// POSTS TAB
// ═══════════════════════════════════════
function renderPosts() {
  renderRecentPosts();
  renderQueueStats();
  renderGenerateSection();
}

function renderRecentPosts() {
  var container = document.getElementById('recentPosts');
  var log = liveData.activity_log || [];

  // Extract posted tweets from log
  var posted = log.filter(function(e) { return e.indexOf('Posted successfully') !== -1; });

  // Extract analytics entries
  var analytics = log.filter(function(e) {
    return e.indexOf('[analytics]') !== -1 && e.indexOf('L=') !== -1;
  });

  var html = '';

  if (posted.length === 0 && analytics.length === 0) {
    html = '<div style="font-size:12px;color:var(--text-dim)">No recent posts found in activity log</div>';
  }

  posted.slice(-6).reverse().forEach(function(entry) {
    var tweetIdMatch = entry.match(/Tweet ID:\s*(\d+)/);
    var tweetId = tweetIdMatch ? tweetIdMatch[1] : '?';
    html +=
      '<div class="post-card">' +
        '<div class="post-handle">\u2705 Posted to X</div>' +
        '<div class="post-text">' + escHtml(entry.substring(0, 140)) + '</div>' +
        '<div class="post-engagement">' +
          '<span>Tweet ID: ' + tweetId + '</span>' +
        '</div>' +
      '</div>';
  });

  analytics.slice(-4).reverse().forEach(function(entry) {
    var parts = entry.match(/@(\S+)\s\|\s([^:]+):\sL=(\d+)\sRT=(\d+)\sR=(\d+)\sI=(\d+)/);
    if (parts) {
      html +=
        '<div class="post-card">' +
          '<div class="post-handle">@' + escHtml(parts[1]) + '</div>' +
          '<div class="post-text">' + escHtml(parts[2]) + '</div>' +
          '<div class="post-engagement">' +
            '<span>\u2764\uFE0F ' + parts[3] + '</span>' +
            '<span>\u{1F504} ' + parts[4] + '</span>' +
            '<span>\u{1F4AC} ' + parts[5] + '</span>' +
            '<span>\u{1F441}\uFE0F ' + parts[6] + '</span>' +
          '</div>' +
        '</div>';
    }
  });

  container.innerHTML = html;
}

function renderQueueStats() {
  var qs = liveData.queue_stats;
  document.getElementById('queueStats').innerHTML =
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">' +
      '<div class="stat-card green">' +
        '<div class="stat-value">' + qs.pending + '</div>' +
        '<div class="stat-label">Pending</div>' +
      '</div>' +
      '<div class="stat-card blue">' +
        '<div class="stat-value">' + qs.posted + '</div>' +
        '<div class="stat-label">Posted</div>' +
      '</div>' +
      '<div class="stat-card gold">' +
        '<div class="stat-value">' + qs.total + '</div>' +
        '<div class="stat-label">Total Queue</div>' +
      '</div>' +
    '</div>';
}

function renderGenerateSection() {
  var accounts = ['GeologyLife', 'Geologic_news', 'GeologyWonders'];
  var html = '';

  accounts.forEach(function(acct) {
    var cmd = 'python3 cron_writer.py --account ' + acct + ' --count 5';
    html +=
      '<div class="cmd-preview" style="margin-bottom:8px;">' +
        '<code>' + escHtml(cmd) + '</code>' +
        '<button class="cmd-copy-btn" onclick="copyCmd(\'' + escAttr(cmd) + '\')">Copy</button>' +
      '</div>';
  });

  html +=
    '<button class="generate-btn" onclick="copyCmd(\'python3 cron_writer.py --account GeologyLife --count 5\')">' +
      '\u26A1 Generate Content Now' +
    '</button>';

  document.getElementById('generateSection').innerHTML = html;
}

function copyCmd(cmd) {
  navigator.clipboard.writeText(cmd).then(function() {
    showToast('Copied: ' + cmd.substring(0, 50) + '...');
  }).catch(function() {
    // Fallback
    var ta = document.createElement('textarea');
    ta.value = cmd;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copied to clipboard');
  });
}

// ═══════════════════════════════════════
// BUDGET TAB
// ═══════════════════════════════════════
function renderBudget() {
  var b = liveData.budget;
  var pct = Math.min((b.spent / b.limit) * 100, 100);
  var circleColor;
  if (pct < 40) circleColor = 'var(--mineral-green)';
  else if (pct < 70) circleColor = 'var(--gold)';
  else circleColor = 'var(--ruby)';

  // Hero gauge
  document.getElementById('budgetHero').innerHTML =
    '<div class="budget-circle" style="background:conic-gradient(' + circleColor + ' 0%,' + circleColor + ' ' + pct + '%,var(--surface2) ' + pct + '%,var(--surface2) 100%)">' +
      '<div class="budget-circle-inner">' +
        '<div class="budget-spent">$' + b.spent.toFixed(3) + '</div>' +
        '<div class="budget-limit">of $' + b.limit.toFixed(2) + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="budget-label">Weekend Budget Usage</div>';

  // Breakdown
  var agents = [
    { name: 'Researcher (Goku)', icon: '\u26A1', detail: 'News scraping + Gemini API', cost: '$0.003' },
    { name: 'Writer (Mary)', icon: '\u{1F4DD}', detail: 'Claude API calls for captions', cost: '$0.008' },
    { name: 'Poster (Pikachu)', icon: '\u26A1', detail: 'X API posting + image upload', cost: '$0.002' },
    { name: 'Analytics', icon: '\u{1F4CA}', detail: 'Tweet metrics collection', cost: '$0.001' },
    { name: 'Maya (Orchestrator)', icon: '\u{1FAA8}', detail: 'Telegram + coordination', cost: '$0.001' }
  ];

  var breakdownHtml = '';
  agents.forEach(function(a) {
    breakdownHtml +=
      '<div class="budget-item">' +
        '<div class="budget-item-icon">' + a.icon + '</div>' +
        '<div class="budget-item-info">' +
          '<div class="budget-item-name">' + a.name + '</div>' +
          '<div class="budget-item-detail">' + a.detail + '</div>' +
        '</div>' +
        '<div class="budget-item-cost">' + a.cost + '</div>' +
      '</div>';
  });
  document.getElementById('budgetBreakdown').innerHTML = breakdownHtml;

  // Projection
  var hoursElapsed = Math.max(1, (Date.now() - new Date(liveData.updated_at).getTime()) / 3600000 + 1);
  var burnRate = b.spent / hoursElapsed;
  var projectedWeekend = burnRate * 48;

  var projColor = projectedWeekend > b.limit ? 'var(--ruby)' : 'var(--mineral-green)';
  document.getElementById('budgetProjection').innerHTML =
    '<div class="projection-title">\u{1F52E} Projected Weekend Total</div>' +
    '<div class="projection-value" style="color:' + projColor + '">' +
      '$' + projectedWeekend.toFixed(2) +
    '</div>' +
    '<div class="projection-note">Based on current burn rate of $' + burnRate.toFixed(4) + '/hr over 48h</div>';
}

// ═══════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escAttr(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}
</script>
